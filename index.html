<!DOCTYPE html>
<html lang="zh">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>小臭猪认证</title>

<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

font-family:'ZCOOL KuaiLe',cursive;

background:linear-gradient(135deg,#ffd1dc,#ffc0cb,#ffb6c1);

overflow:hidden;

}

/* 爱心背景 */

.hearts{

position:absolute;
width:100%;
height:100%;
top:0;
left:0;

pointer-events:none;

}

.heart{

position:absolute;
color:#ff6fa3;
font-size:20px;

animation:fall linear infinite;

}

@keyframes fall{

0%{
transform:translateY(-10vh);
opacity:1;
}

100%{
transform:translateY(110vh);
opacity:0;
}

}

/* 主容器 */

.container{

text-align:center;
z-index:2;

}

/* 表情包 */

.meme{

width:260px;
border-radius:20px;
margin-bottom:20px;

box-shadow:0 10px 25px rgba(0,0,0,0.1);

}

/* 标题 */

h1{

font-size:32px;
color:#ff4d88;

text-shadow:3px 3px white;

margin-bottom:25px;

}

/* 按钮 */

button{

padding:16px 45px;

font-size:22px;

border:none;

border-radius:20px;

cursor:pointer;

margin:10px;

transition:0.25s;

}

/* 是按钮 */

#yes{

background:#ff6fa3;

color:white;

box-shadow:0 6px #e64980;

animation:bounce 1s infinite;

}

/* 不是按钮 */

#no{

background:#ffe4ec;

color:#ff4d88;

}

/* 弹跳 */

@keyframes bounce{

0%,100%{transform:translateY(0);}
50%{transform:translateY(-8px);}

}

/* 提示 */

#tip{

height:30px;
font-size:20px;
color:#ff3c6f;

}

/* 结果页面 */

#result{

display:none;
text-align:center;

}

/* 心跳 */

.bigheart{

font-size:70px;

animation:heartbeat 1s infinite;

}

@keyframes heartbeat{

0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}

}

/* 第二页 */

#food{

display:none;
text-align:center;

}

.foodinput{

padding:14px;

border-radius:10px;

border:none;

width:240px;

font-size:18px;

margin-top:20px;

}

</style>

</head>

<body>

<div class="hearts" id="hearts"></div>

<div class="container" id="question">

<img src="pig.png" class="meme">

<h1>你是不是小臭猪 🐷</h1>

<button id="yes">是</button>

<button id="no">不是</button>

<div id="tip"></div>

</div>


<div id="result">

<div class="bigheart">❤️</div>

<h1>小臭猪认证成功 🐷</h1>

<button onclick="next()">继续</button>

</div>


<div id="food">

    <h1>那小臭猪想吃什么？</h1>
    
    <input id="foodText" class="foodinput" placeholder="比如：奶茶 火锅 烧烤">
    
    <br><br>
    
    <button onclick="submitFood()">确定</button>
    
    </div>
    
    <div id="final" style="display:none">
    
    <div class="bigheart">💖</div>
    
    <h1 id="foodResult"></h1>
    
</div>

<script>

/* 爱心生成 */

function createHeart(){

let heart=document.createElement("div");

heart.className="heart";

heart.innerText="❤";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(Math.random()*5+5)+"s";

document.getElementById("hearts").appendChild(heart);

setTimeout(()=>{

heart.remove();

},8000)

}

setInterval(createHeart,300);


/* 按钮逻辑 */

let yes=document.getElementById("yes");

let no=document.getElementById("no");

let tip=document.getElementById("tip");

let scale=1;


/* 是按钮 */

yes.onclick=function(){

scale+=0.3;

yes.style.transform="scale("+scale+")";

if(scale>2.5){

document.getElementById("question").style.display="none";

document.getElementById("result").style.display="block";

}

}


/* 不是按钮 */

no.onclick=function(){

tip.innerText="不许选这个！";

let x=Math.random()*(window.innerWidth-100);

let y=Math.random()*(window.innerHeight-60);

no.style.position="absolute";

no.style.left=x+"px";

no.style.top=y+"px";

}


/* 下一页 */

function next(){

document.getElementById("result").style.display="none";

document.getElementById("food").style.display="block";

}

function submitFood(){

    let food=document.getElementById("foodText").value;
    
    if(food===""){
    food="好吃的";
    }
    
    document.getElementById("food").style.display="none";
    
    document.getElementById("final").style.display="block";
    
    document.getElementById("foodResult").innerText="走！带小臭猪去吃 "+food+"！";
    
    }

</script>

</body>

</html>
